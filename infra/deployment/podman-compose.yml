version: '3.8'

services:
  # Backend FastAPI
  isurf-api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: isurf-api
    restart: always
    ports:
      - "8082:8000"
    environment:
      - APP_ENV=production
    # Tambahkan dependensi ke database server jika diperlukan
    # depends_on:
    #   - isurf-db

  # Frontend Yii2 Web
  isurf-web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: isurf-web
    restart: always
    ports:
      - "8081:80"
    environment:
      - YII_ENV=prod
      - YII_DEBUG=0
    # depends_on:
    #   - isurf-api
