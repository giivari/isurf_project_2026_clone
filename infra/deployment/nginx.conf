# =========================================================
# NGINX Configuration Template for iSURF @ digdaya.net
# =========================================================

# 1. Konfigurasi Frontend (Yii2 Web)
# Letakkan di: /etc/nginx/sites-available/isurf.digdaya.net.conf
server {
    listen 80;
    server_name isurf.digdaya.net;

    # Jika sudah menggunakan SSL (Let's Encrypt), tambahkan block 443 di bawahnya.
    # Proxy pass ke container isurf-web (port 8081)
    location / {
        proxy_pass http://localhost:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

